# 行为分析 BI：Metabase 连 Doris（Doris 兼容 MySQL 协议，用 MySQL driver 直连 FE 9030）
# 用法：docker compose up -d → http://localhost:3000 初始化后按 README 添加 Doris 数据源
services:
  metabase:
    image: metabase/metabase:latest
    container_name: qy-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db   # 元数据存本地卷（小团队够用，规模化换 Postgres）
      JAVA_TIMEZONE: Asia/Shanghai
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  metabase-data:
