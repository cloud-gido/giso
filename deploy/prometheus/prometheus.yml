# GISO 本地栈 · Prometheus 抓取配置
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: giso-event-bridge
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["event-bridge:9100"]
        labels:
          service: giso-event-bridge

  - job_name: giso-gateway
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["gateway:8123"]
        labels:
          service: giso-gateway
