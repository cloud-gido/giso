# Prometheus Alertmanager：飞书 / Slack 示例
# 飞书：用开源 lark-webhook 或自建 adapter 将 Prometheus webhook 转为飞书机器人格式
# Slack：使用官方 slack_configs + Incoming Webhook URL

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity, space_key]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: slack-critical
      continue: true
    - match_re:
        alertname: Giso.*
      receiver: lark

receivers:
  - name: default
    webhook_configs:
      - url: http://127.0.0.1:65535/discard
        send_resolved: false

  - name: lark
    webhook_configs:
      # 部署 deploy/lark-webhook 或替换为内网 adapter 地址
      - url: ${LARK_WEBHOOK_ADAPTER:-http://lark-webhook:8080/webhook}
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL}
        channel: '#giso-alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *{{ .Labels.severity }}* {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
