name: sdk-publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (e.g. 1.0.0); required for manual run'
        required: true
        type: string

concurrency:
  group: sdk-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: python3 tools/codegen/generate.py --check

  publish-android:
    name: Publish Android AAR (Maven)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Publish to GitHub Packages
        working-directory: sdk/android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          VERSION='${{ steps.ver.outputs.version }}'
          GROUP_PATH='com/giso/tracker'
          META_URL="https://maven.pkg.github.com/${{ github.repository }}/$GROUP_PATH/maven-metadata.xml"
          if curl -fsSL -u "${GITHUB_ACTOR}:${GITHUB_TOKEN}" "$META_URL" \
            | grep -q "<version>${VERSION}</version>"; then
            echo "Maven com.giso:tracker:${VERSION} already published, skipping."
            exit 0
          fi
          gradle publishReleasePublicationToGitHubPackagesRepository \
            -PgisoVersion="${VERSION}" \
            -PgisoGithubRepo=${{ github.repository }}

  publish-web:
    name: Publish Web SDK (npm)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@cloud-gido'
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Build and publish
        working-directory: sdk/web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION='${{ steps.ver.outputs.version }}'
          npm install
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          npm run build
          if npm view "@cloud-gido/giso-tracker-web@${VERSION}" version 2>/dev/null; then
            echo "npm @cloud-gido/giso-tracker-web@${VERSION} already published, skipping."
            exit 0
          fi
          npm publish --access restricted

  publish-flutter:
    name: Publish Flutter SDK (validate + tarball)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Set package version
        working-directory: sdk/flutter/giso_tracker
        run: |
          sed -i "s/^version: .*/version: ${VERSION}/" pubspec.yaml
        env:
          VERSION: ${{ steps.ver.outputs.version }}
      - name: Analyze and test
        working-directory: sdk/flutter/giso_tracker
        run: |
          flutter pub get
          flutter analyze --fatal-infos
          flutter test
      - name: Pack SDK tarball
        run: |
          VERSION='${{ steps.ver.outputs.version }}'
          mkdir -p dist
          COPYFILE_DISABLE=1 tar -czf "dist/giso_tracker-${VERSION}.tar.gz" \
            --exclude='.dart_tool' --exclude='build' \
            -C sdk/flutter giso_tracker
      - name: Upload tarball (tag builds)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: giso_tracker-${{ steps.ver.outputs.version }}
          path: dist/giso_tracker-*.tar.gz
          retention-days: 90
